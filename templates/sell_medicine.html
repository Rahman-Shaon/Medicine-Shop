{% extends 'layout.html' %}

{% block content %}
<div class="page-header">
    <h2>Sell Medicine: {{ medicine.name }}</h2>
    <a href="{{ url_for('medicines') }}" class="btn">Back to List</a>
</div>

<div class="card" style="max-width: 500px; margin-bottom: 20px;">
    <p><strong>Available Stock:</strong> {{ medicine.quantity }}</p>
    <p><strong>Unit Price:</strong> {{ "%.2f"|format(medicine.price) }} tk</p>
</div>

<form action="{{ url_for('sell_medicine', id=medicine.id) }}" method="POST" style="max-width: 500px;">
    <div class="form-group">
        <label for="quantity">Quantity to Sell</label>
        <input type="number" id="quantity" name="quantity" class="form-control" min="1" max="{{ medicine.quantity }}" required>
    </div>
    <button type="submit" class="btn btn-success">Confirm Sale & Generate Bill</button>
</form>

{% endblock %}

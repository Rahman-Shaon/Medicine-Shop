{% extends 'layout.html' %}

{% block content %}
<div class="page-header">
    <h2>Edit Medicine: {{ medicine.name }}</h2>
    <a href="{{ url_for('medicines') }}" class="btn">Back to List</a>
</div>

<form action="{{ url_for('edit_medicine', id=medicine.id) }}" method="POST" style="max-width: 500px;">
    <div class="form-group">
        <label for="name">Medicine Name</label>
        <input type="text" id="name" name="name" class="form-control" value="{{ medicine.name }}" required>
    </div>
    <div class="form-group">
        <label for="category">Category</label>
        <input type="text" id="category" name="category" class="form-control" value="{{ medicine.category }}" required>
    </div>
    <div class="form-group">
        <label for="price">Price (tk)</label>
        <input type="number" step="0.01" id="price" name="price" class="form-control" value="{{ medicine.price }}" required>
    </div>
    <div class="form-group">
        <label for="quantity">Quantity in Stock</label>
        <input type="number" id="quantity" name="quantity" class="form-control" value="{{ medicine.quantity }}" required>
    </div>
    <div class="form-group">
        <label for="expiry_date">Expiry Date</label>
        <input type="date" id="expiry_date" name="expiry_date" class="form-control" value="{{ medicine.expiry_date }}" required>
    </div>
    <button type="submit" class="btn btn-success">Update Medicine</button>
</form>

{% endblock %}
